<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Manager</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <!-- Header / Navbar -->
    <header class="navbar">
        <div class="nav-container">
            <div class="logo">ContactApp</div>
        </div>
    </header>

    <!-- Main Content -->
    <div class="container">

        <!-- Page Title -->
        <div class="page-title">
            <h1>Contact Manager</h1>
            <p>Add, edit, and search your contacts easily.</p>
        </div>

        <!-- Search Bar -->
        <div class="search-bar">
            <input type="text" id="searchInput" placeholder="Search by name or email...">
        </div>

        <!-- Add Contact Form -->
        <div class="card">
            <h2 id="formTitle">Add New Contact</h2>
            <form id="contactForm">
                <div class="form-group">
                    <label for="nameInput">Name</label>
                    <input type="text" id="nameInput" placeholder="Enter full name" required>
                </div>
                <div class="form-group">
                    <label for="emailInput">Email</label>
                    <input type="email" id="emailInput" placeholder="example@email.com" required>
                </div>
                <div class="form-group">
                    <label for="phoneInput">Phone</label>
                    <input type="tel" id="phoneInput" placeholder="1234567890" required>
                </div>
                <div class="form-actions">
                    <button type="submit" id="submitBtn" class="btn-green">Add Contact</button>
                    <button type="button" id="cancelBtn" class="btn-outline" style="display:none;">Cancel</button>
                </div>
            </form>
        </div>

        <!-- Contacts List (below the form) -->
        <div class="card" style="margin-top: 20px;">
            <div class="list-header">
                <h2>Your Contacts (<span id="contactCount">0</span>)</h2>
                <button id="clearAllBtn" class="btn-danger" style="display:none;">Clear All</button>
            </div>

            <div id="contactsList"></div>

            <div id="emptyState" class="empty-state">
                <p>No contacts yet. Add one using the form.</p>
            </div>
        </div>
    </div>

    <!-- Footer -->


    <!-- Toast Notification -->
    <div id="toast" class="toast"></div>

    <script src="script.js"></script>
</body>

</html>
