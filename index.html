<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Manager</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="container">
        <!-- Header Section -->
        <header class="header">
            <h1>Contact Manager</h1>
            <p>Manage your contacts easily</p>
        </header>

        <!-- Search Bar -->
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Search by name or email...">
        </div>

        <!-- Contact Form -->
        <div class="form-card">
            <h2 id="formTitle">Add New Contact</h2>

            <form id="contactForm">
                <div class="form-group">
                    <label for="nameInput">Name:</label>
                    <input type="text" id="nameInput" placeholder="Enter full name" required>
                    <span class="error" id="nameError"></span>
                </div>

                <div class="form-group">
                    <label for="emailInput">Email:</label>
                    <input type="email" id="emailInput" placeholder="example@email.com" required>
                    <span class="error" id="emailError"></span>
                </div>

                <div class="form-group">
                    <label for="phoneInput">Phone Number:</label>
                    <input type="tel" id="phoneInput" placeholder="1234567890" required>
                    <span class="error" id="phoneError"></span>
                </div>

                <div class="button-group">
                    <button type="submit" class="btn btn-primary" id="submitBtn">
                        Add Contact
                    </button>
                    <button type="button" class="btn btn-secondary" id="cancelBtn" style="display: none;">
                        Cancel
                    </button>
                </div>
            </form>
        </div>

        <!-- Contacts List Section -->
        <div class="contacts-section">
            <div class="section-header">
                <h2>Your Contacts (<span id="contactCount">0</span>)</h2>
                <button id="clearAllBtn" class="btn btn-danger" style="display: none;">
                    Clear All
                </button>
            </div>

            <!-- Empty State Message -->
            <div id="emptyState" class="empty-state">
                <p>No contacts yet. Add your first contact above!</p>
            </div>

            <!-- Contacts List -->
            <div id="contactsList"></div>
        </div>
    </div>

    <!-- Notification Toast -->
    <div id="toast" class="toast">
        <span id="toastMessage"></span>
    </div>

    <script src="script.js"></script>
</body>

</html>
